<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trabalhando com imagens</title>
  </head>
  <body>
    <header>
      <h1>Trabalhando com Imagens</h1>
    </header>
    <section class="Horizontal">
      <h2>Imagens Horizontais</h2>
      <div class="galeria-horizontal">
        <img src="./img/img4.jpg" alt="dog" />
        <img src="./img/img2.jpg" alt="imperador" />
        <img src="./img/cr7.jpg" alt="kaka" />
        <img src="./img/pessi.webp" alt="neymar" />
        <img src="./img/rei.jpg" alt="brinquedo" />
        <img src="./img/4.jpg" alt="brinquedo" />
      </div>
    </section>
    <section class="Vertical">
      <h2>Imagens Verticais</h2>
      <div class="galeria-vertical">
        <img src="./img/kaka.54.jpg" alt="dog" />
        <img src="./img/ney.jpg" alt="imperador" />
        <img src="./img/pessi.2.jpg" alt="kaka" />
        <img src="./img/rei.2.jpg" alt="neymar" />
        <img src="./img/cr7.5.jpg" alt="brinquedo" />
        <img src="./img/4.jpg" alt="brinquedo" />
      </div>
    </section>
    <section class="Mosaico">
      <h2>Mosaico de imagens</h2>
      <div class="grid">
        <img src="./img/img4.jpg" alt="dog" />
        <img src="./img/img2.jpg" alt="imperador" />
        <img src="./img/cr7.jpg" alt="kaka" />
        <img src="./img/pessi.webp" alt="neymar" />
        <img src="./img/rei.jpg" alt="brinquedo" />
        <img src="./img/4.jpg" alt="brinquedo" />
      </div>
    </section>
    <br class="Formulario">
      <h2>Formulario de contato</h2>
      <br>
        <input type="text" placeholder="Nome" /><br></br>
        <input type="email" placeholder="Email" /><br></br>
        <textarea placeholder="Mensagem"></textarea>
        <button type="submit">Enviar</button>
      </form>
    </section>
    <section class="Video">
      <h2>Vídeos</h2>
      <video controls>
        <source src="./img/FINAL.mp4" type="video/mp4" />
      </video>
    </section>
    <section class="VideoExterno">
      <h2>Vídeo Externo</h2>
      <iframe
        width="1337"
        height="752"
        src="https://www.youtube.com/embed/zhEWqfP6V_w"
        title="THE GREATEST FINAL EVER?! | Argentina v France | FIFA World Cup Qatar 2022 Highlights"
        frameborder="0"
        allow="
          accelerometer;
          autoplay;
          clipboard-write;
          encrypted-media;
          gyroscope;
          picture-in-picture;
          web-share;
        "
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>
    </section>
  </body>
</html>
